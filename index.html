<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领克20迪士尼AR活动 - 核心链路UI原型</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #151515 50%, #0a0a0a 100%);
      min-height: 100vh;
      padding: 60px 40px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .page-title span {
      color: #01FF95;
      text-shadow: 0 0 30px rgba(1, 255, 149, 0.3);
    }

    .page-subtitle {
      color: #666;
      font-size: 14px;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    .prototype-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      justify-content: center;
      max-width: 2000px;
      margin: 0 auto;
    }

    .screen-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .screen-label {
      color: #01FF95;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .iphone-frame {
      position: relative;
      background: linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 100%);
      padding: 14px;
      border-radius: 58px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 0 2px rgba(0,0,0,0.5),
        0 25px 50px rgba(0,0,0,0.4),
        0 50px 100px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .iphone-screen {
      position: relative;
      border-radius: 46px;
      overflow: hidden;
      background: #0d0d0d;
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      z-index: 20;
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }

    .screen-content {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      bottom: 34px;
      overflow: hidden;
    }

    /* 动画效果 */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(1, 255, 149, 0.2); }
      50% { box-shadow: 0 0 30px rgba(1, 255, 149, 0.4); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1 class="page-title">领克20 × 玩具总动员 <span>AR活动</span></h1>
    <p class="page-subtitle">核心链路 UI 原型 · 14个关键页面 · v2.8</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    // ==================== 品牌色 ====================
    const COLORS = {
      lynkGreen: '#01FF95',
      lynkGreenDark: '#00CC77',
      lynkDark: '#0d0d0d',
      lynkGray: '#1a1a1a',
      lynkMidGray: '#252525',
      lynkLightGray: '#333333',
      textWhite: '#ffffff',
      textPrimary: '#ffffff',
      textSecondary: '#999999',
      textTertiary: '#666666',
      // 玩具总动员IP色
      woodyYellow: '#FFD93D',
      woodyOrange: '#FFA500',
      buzzBlue: '#4A90D9',
      buzzPurple: '#5B4FCF',
      rexGreen: '#6BCB77',
      hammPink: '#FF6B6B',
      boPeepBlue: '#87CEEB',
    };

    // ==================== iPhone Frame组件 ====================
    function IosFrame({ children, label, width = 393, height = 852 }) {
      return (
        <div class="screen-wrapper">
          <div class="screen-label">{label}</div>
          <div class="iphone-frame">
            <div class="iphone-screen" style={{ width, height }}>
              <div class="status-bar">
                <span>9:41</span>
                <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                  <svg width="18" height="12" viewBox="0 0 18 12" fill="white">
                    <rect x="0" y="8" width="3" height="4" rx="1" opacity="0.4"/>
                    <rect x="4" y="6" width="3" height="6" rx="1" opacity="0.6"/>
                    <rect x="8" y="4" width="3" height="8" rx="1" opacity="0.8"/>
                    <rect x="12" y="2" width="3" height="10" rx="1"/>
                  </svg>
                  <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
                    <path d="M8 3a1 1 0 100-2 1 1 0 000 2z"/>
                    <path d="M3 6a5 5 0 0110 0" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
                    <path d="M1 3a7 7 0 0114 0" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.5"/>
                  </svg>
                  <div style={{
                    width: 25, height: 12,
                    border: '1.5px solid rgba(255,255,255,0.8)',
                    borderRadius: 3,
                    position: 'relative'
                  }}>
                    <div style={{
                      position: 'absolute',
                      left: 2, top: 2,
                      width: 18, height: 6,
                      background: 'white',
                      borderRadius: 1
                    }}/>
                    <div style={{
                      position: 'absolute',
                      right: -3, top: 2,
                      width: 2, height: 6,
                      background: 'rgba(255,255,255,0.8)',
                      borderRadius: 1
                    }}/>
                  </div>
                </div>
              </div>
              <div class="dynamic-island" />
              <div class="screen-content">{children}</div>
              <div class="home-indicator" />
            </div>
          </div>
        </div>
      );
    }

    // ==================== 通用组件 ====================
    function Card({ children, style = {}, glow = false, gradient = false }) {
      return (
        <div style={{
          background: gradient
            ? `linear-gradient(145deg, ${COLORS.lynkMidGray} 0%, ${COLORS.lynkGray} 100%)`
            : COLORS.lynkMidGray,
          borderRadius: 20,
          padding: 20,
          boxShadow: glow
            ? `0 0 0 1px rgba(1,255,149,0.1), 0 8px 32px rgba(0,0,0,0.3)`
            : `0 4px 24px rgba(0,0,0,0.2)`,
          ...style
        }}>
          {children}
        </div>
      );
    }

    function Button({ children, primary = false, style = {}, fullWidth = false }) {
      return (
        <button style={{
          width: fullWidth ? '100%' : 'auto',
          padding: '16px 24px',
          borderRadius: 14,
          border: primary ? 'none' : '1px solid rgba(255,255,255,0.1)',
          background: primary
            ? `linear-gradient(135deg, ${COLORS.lynkGreen} 0%, ${COLORS.lynkGreenDark} 100%)`
            : COLORS.lynkMidGray,
          color: primary ? COLORS.lynkDark : COLORS.textPrimary,
          fontSize: 15,
          fontWeight: 600,
          cursor: 'pointer',
          boxShadow: primary
            ? `0 4px 20px rgba(1,255,149,0.3), inset 0 1px 0 rgba(255,255,255,0.2)`
            : 'none',
          transition: 'all 0.2s ease',
          letterSpacing: '0.02em',
          ...style
        }}>
          {children}
        </button>
      );
    }

    function GlowText({ children, color = COLORS.lynkGreen }) {
      return (
        <span style={{
          color,
          textShadow: `0 0 20px ${color}40`,
          fontWeight: 600
        }}>
          {children}
        </span>
      );
    }

    // ==================== 1. 活动首页 ====================
    function HomeScreen() {
      const progress = 3;
      const total = 5;

      return (
        <div style={{ height: '100%', background: COLORS.lynkDark, padding: '20px', display: 'flex', flexDirection: 'column' }}>
          {/* 顶部Logo区域 */}
          <div style={{ textAlign: 'center', marginTop: 10, marginBottom: 24 }}>
            <div style={{
              display: 'inline-flex',
              alignItems: 'center',
              gap: 8,
              marginBottom: 12
            }}>
              <div style={{
                width: 32, height: 32,
                background: `linear-gradient(135deg, ${COLORS.lynkGreen} 0%, ${COLORS.lynkGreenDark} 100%)`,
                borderRadius: 8,
                boxShadow: `0 4px 12px rgba(1,255,149,0.3)`
              }}/>
              <span style={{ color: COLORS.textTertiary, fontSize: 12 }}>×</span>
              <div style={{
                width: 32, height: 32,
                background: `linear-gradient(135deg, ${COLORS.woodyYellow} 0%, ${COLORS.woodyOrange} 100%)`,
                borderRadius: 8,
                boxShadow: `0 4px 12px rgba(255,217,61,0.3)`
              }}/>
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, color: COLORS.textPrimary, marginBottom: 6 }}>
              领克20 × 玩具总动员
            </div>
            <div style={{
              fontSize: 13,
              color: COLORS.textSecondary,
              letterSpacing: '0.05em'
            }}>AR互动赢周边</div>
          </div>

          {/* 投稿进度 */}
          <Card glow style={{ marginBottom: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
              <span style={{ color: COLORS.textPrimary, fontSize: 14, fontWeight: 500 }}>投稿进度</span>
              <GlowText>已投稿 {progress}/{total} 次</GlowText>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[1,2,3,4,5].map(i => (
                <div key={i} style={{
                  flex: 1,
                  height: 10,
                  borderRadius: 5,
                  background: i <= progress
                    ? `linear-gradient(90deg, ${COLORS.lynkGreen} 0%, ${COLORS.lynkGreenDark} 100%)`
                    : 'rgba(255,255,255,0.08)',
                  boxShadow: i <= progress ? `0 2px 8px rgba(1,255,149,0.3)` : 'none',
                  transition: 'all 0.3s ease'
                }} />
              ))}
            </div>
          </Card>

          {/* 奖品池 */}
          <Card gradient style={{ marginBottom: 16 }}>
            <div style={{ color: COLORS.textPrimary, fontSize: 14, fontWeight: 500, marginBottom: 14 }}>奖品池</div>

            {/* 壁纸区 */}
            <div style={{ marginBottom: 12 }}>
              <div style={{
                fontSize: 11,
                color: COLORS.textTertiary,
                marginBottom: 8,
                letterSpacing: '0.05em'
              }}>超高清壁纸 · 100%中奖</div>
              <div style={{ display: 'flex', gap: 10 }}>
                {[
                  { color: COLORS.woodyYellow, name: '胡迪' },
                  { color: COLORS.buzzBlue, name: '巴斯' },
                  { color: COLORS.rexGreen, name: '抱抱龙' },
                  { color: COLORS.boPeepBlue, name: '宝贝' },
                  { color: COLORS.hammPink, name: '火腿' },
                ].map((item, i) => (
                  <div key={i} style={{
                    width: 52,
                    height: 70,
                    borderRadius: 12,
                    background: `linear-gradient(145deg, ${item.color}25 0%, ${item.color}10 100%)`,
                    border: `1px solid ${item.color}40`,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    boxShadow: `0 4px 12px ${item.color}15`,
                    position: 'relative'
                  }}>
                    <div style={{
                      width: 36,
                      height: 48,
                      borderRadius: 6,
                      background: `linear-gradient(145deg, ${item.color}40 0%, ${item.color}20 100%)`
                    }}/>
                    <div style={{
                      position: 'absolute',
                      bottom: 6,
                      fontSize: 9,
                      color: item.color,
                      fontWeight: 500
                    }}>{item.name}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* 周边区 */}
            <div>
              <div style={{
                fontSize: 11,
                color: COLORS.textTertiary,
                marginBottom: 8,
                letterSpacing: '0.05em'
              }}>联名周边 · 概率掉落</div>
              <div style={{ display: 'flex', gap: 10 }}>
                {[
                  { color: COLORS.woodyYellow, name: '公仔' },
                  { color: COLORS.buzzBlue, name: '钥匙扣' },
                  { color: COLORS.rexGreen, name: '背包' },
                  { color: COLORS.hammPink, name: '徽章' },
                ].map((item, i) => (
                  <div key={i} style={{
                    width: 52,
                    height: 52,
                    borderRadius: 12,
                    background: `linear-gradient(145deg, ${item.color}20 0%, ${item.color}08 100%)`,
                    border: `1px solid ${item.color}30`,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    boxShadow: `0 4px 12px ${item.color}10`
                  }}>
                    <div style={{
                      fontSize: 9,
                      color: item.color,
                      fontWeight: 500
                    }}>{item.name}</div>
                  </div>
                ))}
              </div>
            </div>
          </Card>

          {/* 弹性空间 */}
          <div style={{ flex: 1 }} />

          {/* 活动规则入口 */}
          <div style={{
            display: 'flex',
            justifyContent: 'center',
            marginBottom: 16
          }}>
            <div style={{
              fontSize: 12,
              color: COLORS.textSecondary,
              padding: '6px 12px',
              background: 'rgba(255,255,255,0.05)',
              borderRadius: 20
            }}>
              活动规则 ▸
            </div>
          </div>

          {/* 主按钮 */}
          <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
            <Button style={{ flex: 1 }}>参与记录</Button>
            <Button primary style={{ flex: 2 }}>开始拍照</Button>
          </div>

          {/* 留资入口 */}
          <Card style={{
            padding: '14px 16px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center'
          }}>
            <span style={{ color: COLORS.textSecondary, fontSize: 12 }}>留下联系方式，获取活动资讯</span>
            <span style={{
              color: COLORS.lynkGreen,
              fontSize: 13,
              fontWeight: 500,
              display: 'flex',
              alignItems: 'center',
              gap: 4
            }}>去填写 <span style={{ fontSize: 11 }}>→</span></span>
          </Card>
        </div>
      );
    }

    // ==================== 2. AR拍照页 ====================
    function ARScreen() {
      return (
        <div style={{
          height: '100%',
          background: `radial-gradient(ellipse at center, #1e1e2e 0%, ${COLORS.lynkDark} 70%)`,
          position: 'relative'
        }}>
          {/* AR网格背景 */}
          <div style={{
            position: 'absolute',
            top: 0, left: 0, right: 0, bottom: 0,
            background: `
              linear-gradient(rgba(1,255,149,0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(1,255,149,0.03) 1px, transparent 1px)
            `,
            backgroundSize: '30px 30px',
            opacity: 0.5
          }} />

          {/* 顶部提示 */}
          <div style={{
            position: 'absolute',
            top: 20,
            left: '50%',
            transform: 'translateX(-50%)',
            background: 'rgba(0,0,0,0.6)',
            padding: '10px 20px',
            borderRadius: 25,
            backdropFilter: 'blur(10px)',
            boxShadow: '0 4px 20px rgba(0,0,0,0.3)'
          }}>
            <span style={{ color: COLORS.textSecondary, fontSize: 13 }}>
              移动手机寻找平面
            </span>
          </div>

          {/* 车模展示区 */}
          <div style={{
            position: 'absolute',
            top: '45%',
            left: '50%',
            transform: 'translate(-50%, -50%)',
            textAlign: 'center'
          }}>
            {/* 地面网格 */}
            <div style={{
              width: 220,
              height: 100,
              background: `
                linear-gradient(${COLORS.lynkGreen}20 2px, transparent 2px),
                linear-gradient(90deg, ${COLORS.lynkGreen}20 2px, transparent 2px)
              `,
              backgroundSize: '20px 20px',
              borderRadius: 10,
              border: `1px solid ${COLORS.lynkGreen}30`,
              boxShadow: `0 8px 32px rgba(1,255,149,0.15)`,
              marginBottom: -30,
              transform: 'perspective(200px) rotateX(60deg)',
              opacity: 0.6
            }} />

            {/* 车模 */}
            <div style={{
              width: 160,
              height: 80,
              background: `linear-gradient(145deg, #3a3a3a 0%, #2a2a2a 50%, #1a1a1a 100%)`,
              borderRadius: 15,
              boxShadow: `
                0 10px 40px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.1),
                inset 0 -1px 0 rgba(0,0,0,0.3)
              `,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              margin: '0 auto'
            }}>
              <div style={{
                width: 100,
                height: 45,
                background: `linear-gradient(90deg, #444 0%, #555 30%, #444 70%, #333 100%)`,
                borderRadius: 8,
                boxShadow: 'inset 0 2px 4px rgba(255,255,255,0.1)'
              }} />
            </div>

            <div style={{
              marginTop: 16,
              fontSize: 12,
              color: COLORS.lynkGreen,
              fontWeight: 500,
              textShadow: `0 0 10px rgba(1,255,149,0.5)`
            }}>
              领克20 车模
            </div>
          </div>

          {/* 左右转按钮 */}
          <div style={{
            position: 'absolute',
            bottom: 120,
            left: 0,
            right: 0,
            display: 'flex',
            justifyContent: 'space-between',
            padding: '0 40px'
          }}>
            {['↺', '↻'].map((icon, i) => (
              <div key={i} style={{
                width: 64,
                height: 64,
                borderRadius: 32,
                background: 'rgba(255,255,255,0.12)',
                backdropFilter: 'blur(10px)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                color: COLORS.textPrimary,
                fontSize: 24,
                boxShadow: `
                  0 4px 20px rgba(0,0,0,0.3),
                  inset 0 1px 0 rgba(255,255,255,0.1)
                `,
                border: '1px solid rgba(255,255,255,0.1)'
              }}>
                {icon}
              </div>
            ))}
          </div>

          {/* 拍照按钮 */}
          <div style={{
            position: 'absolute',
            bottom: 40,
            left: '50%',
            transform: 'translateX(-50%)'
          }}>
            <div style={{
              width: 80,
              height: 80,
              borderRadius: 40,
              border: '5px solid rgba(255,255,255,0.9)',
              boxShadow: `
                0 0 0 3px rgba(0,0,0,0.2),
                0 8px 30px rgba(0,0,0,0.4)
              `,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              background: 'rgba(0,0,0,0.2)'
            }}>
              <div style={{
                width: 64,
                height: 64,
                borderRadius: 32,
                background: `linear-gradient(145deg, ${COLORS.lynkGreen} 0%, ${COLORS.lynkGreenDark} 100%)`,
                boxShadow: `
                  0 4px 20px rgba(1,255,149,0.4),
                  inset 0 2px 0 rgba(255,255,255,0.3)
                `
              }} />
            </div>
          </div>
        </div>
      );
    }

    // ==================== 3. 照片预览上传页 ====================
    function PhotoPreviewScreen() {
      const [frameType, setFrameType] = React.useState('horizontal');
      const remaining = 2;

      const frames = [
        { color: COLORS.woodyYellow, name: '胡迪' },
        { color: COLORS.buzzBlue, name: '巴斯' },
        { color: COLORS.rexGreen, name: '叉叉' },
        { color: COLORS.hammPink, name: '抱抱龙' },
        { color: COLORS.lynkGreen, name: '组合' },
      ];

      return (
        <div style={{ height: '100%', background: COLORS.lynkDark, padding: '20px 16px', display: 'flex', flexDirection: 'column' }}>
          {/* 顶部信息 */}
          <div style={{ textAlign: 'center', marginBottom: 16 }}>
            <span style={{ color: COLORS.textSecondary, fontSize: 13 }}>
              剩余投稿次数：<GlowText>{remaining}</GlowText> 次
            </span>
          </div>

          {/* 照片预览区 */}
          <div style={{
            flex: 1,
            background: `linear-gradient(145deg, ${COLORS.lynkGray} 0%, ${COLORS.lynkDark} 100%)`,
            borderRadius: 20,
            marginBottom: 20,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            position: 'relative',
            boxShadow: 'inset 0 2px 10px rgba(0,0,0,0.3)',
            overflow: 'hidden'
          }}>
            {/* 边框效果 */}
            <div style={{
              position: 'absolute',
              inset: 12,
              border: `3px solid ${COLORS.woodyYellow}`,
              borderRadius: 16,
              boxShadow: `
                0 0 20px ${COLORS.woodyYellow}30,
                inset 0 0 20px ${COLORS.woodyYellow}10
              `,
              opacity: 0.8
            }} />

            {/* 照片占位 */}
            <div style={{ textAlign: 'center', position: 'relative' }}>
              <div style={{
                width: 120,
                height: 120,
                borderRadius: 12,
                background: `linear-gradient(145deg, #333 0%, #222 100%)`,
                marginBottom: 12,
                boxShadow: '0 8px 32px rgba(0,0,0,0.4)'
              }} />
              <div style={{ color: COLORS.textSecondary, fontSize: 12 }}>AR拍摄照片</div>
            </div>

            {/* IP角色装饰 */}
            <div style={{
              position: 'absolute',
              bottom: 20,
