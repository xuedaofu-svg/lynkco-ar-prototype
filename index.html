<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领克 App - 预约试驾</title>
  <style>
    /* ========== 领克 Design Tokens ========== */
    :root {
      /* brand */
      --brand-primary: #1EF1C6;
      --brand-secondary: #354D4F;
      --brand-tertiary: #212B29;

      /* text */
      --text-primary: #FFFFFF;
      --text-secondary: #CFCFCF;
      --text-tertiary: #8D8D8D;
      --text-quaternary: #464646;

      /* bg */
      --bg-page-1: #131313;
      --bg-page-2: #131313;
      --bg-popup: #262626;

      /* card */
      --card-bg-1: #262626;
      --card-bg-2: #262626;
      --card-bg-3: #393939;

      /* divider */
      --divider-1: #2F2F2F;
      --divider-2: #393939;

      /* button */
      --btn-primary-bg: #1EF1C6;
      --btn-primary-text: #131313;
      --btn-secondary-line: #1EF1C6;
      --btn-tertiary-line: #FFFFFF;
      --btn-tertiary-text: #FFFFFF;
      --btn-disabled-bg: #262626;
      --btn-disabled-text: #8D8D8D;

      /* status */
      --status-error: #DC1860;

      /* spacing */
      --space-xs: 4px;
      --space-s: 8px;
      --space-m: 12px;
      --space-l: 16px;
      --space-xl: 20px;
      --space-2xl: 24px;
      --space-3xl: 32px;
      --space-4xl: 36px;
      --space-5xl: 40px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ========== iOS Frame ========== */
    .ios-wrapper {
      display: inline-block;
      padding: 12px;
      background: #000;
      border-radius: 60px;
      box-shadow: 0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3);
    }

    .ios-screen {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 48px;
      overflow: hidden;
      background: var(--bg-page-1);
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 36px;
      background: #000;
      border-radius: 999px;
      z-index: 30;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      z-index: 20;
      pointer-events: none;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .signal-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal-bar {
      width: 3px;
      background: currentColor;
      border-radius: 1px;
    }

    .battery {
      width: 26px;
      height: 12px;
      border: 1.5px solid currentColor;
      border-radius: 3px;
      padding: 1px;
      position: relative;
      opacity: 0.8;
    }

    .battery-cap {
      position: absolute;
      top: 3px;
      right: -3px;
      width: 2px;
      height: 6px;
      background: currentColor;
      border-radius: 0 1px 1px 0;
    }

    .home-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 999px;
      z-index: 10;
    }

    /* ========== App Content ========== */
    .app-content {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      bottom: 34px;
      overflow: hidden;
    }

    /* ========== Hero Section ========== */
    .hero-section {
      position: relative;
      height: 55%;
      background: linear-gradient(180deg, #1a1a1a 0%, #131313 100%);
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }

    .hero-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      color: var(--text-tertiary);
    }

    .hero-placeholder .car-icon {
      width: 120px;
      height: 120px;
      margin-bottom: var(--space-l);
      opacity: 0.3;
    }

    .hero-placeholder .placeholder-text {
      font-size: 14px;
      color: var(--text-tertiary);
    }

    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, var(--bg-page-1), transparent);
    }

    /* ========== Logo in Hero ========== */
    .hero-logo {
      position: absolute;
      top: var(--space-xl);
      left: var(--space-xl);
      height: 24px;
      opacity: 0.9;
    }

    /* ========== Bottom Sheet ========== */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-popup);
      padding: var(--space-xl);
      padding-bottom: var(--space-2xl);
    }

    /* ========== Sheet Title with Green Bar ========== */
    .sheet-title-row {
      display: flex;
      align-items: center;
      margin-bottom: var(--space-2xl);
    }

    .green-indicator {
      width: 2px;
      height: 16px;
      background: var(--brand-primary);
      margin-right: var(--space-s);
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ========== Form Fields ========== */
    .form-field {
      padding: var(--space-l) 0;
      border-bottom: 1px solid var(--divider-1);
      cursor: pointer;
      transition: background 0.15s;
    }

    .form-field:hover {
      background: rgba(255,255,255,0.02);
    }

    .form-field-label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }

    .form-field-value {
      font-size: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-field-value .arrow {
      width: 20px;
      height: 20px;
      color: var(--text-tertiary);
    }

    .form-field-placeholder {
      color: var(--text-tertiary);
    }

    /* ========== Input Field ========== */
    .input-field {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 16px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    /* ========== Primary Button ========== */
    .btn-primary {
      width: 100%;
      height: 40px;
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      cursor: pointer;
      margin-top: var(--space-2xl);
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      background: var(--btn-disabled-bg);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
    }

    /* ========== Disclaimer ========== */
    .disclaimer {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: var(--space-m);
      line-height: 1.5;
    }

    /* ========== Selection Modal ========== */
    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      display: none;
      align-items: flex-end;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      width: 100%;
      background: var(--bg-popup);
      max-height: 70%;
      overflow-y: auto;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-xl);
      border-bottom: 1px solid var(--divider-1);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .modal-close {
      width: 24px;
      height: 24px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* ========== Vehicle Card ========== */
    .vehicle-card {
      display: flex;
      align-items: center;
      padding: var(--space-l) var(--space-xl);
      border-bottom: 1px solid var(--divider-1);
      cursor: pointer;
      transition: background 0.15s;
    }

    .vehicle-card:hover {
      background: rgba(255,255,255,0.02);
    }

    .vehicle-card.selected {
      border-left: 2px solid var(--brand-primary);
      background: rgba(30, 241, 198, 0.05);
    }

    .vehicle-image {
      width: 80px;
      height: 60px;
      background: var(--card-bg-3);
      margin-right: var(--space-l);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 11px;
    }

    .vehicle-info {
      flex: 1;
    }

    .vehicle-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    .vehicle-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ========== Store Card ========== */
    .store-card {
      padding: var(--space-l) var(--space-xl);
      border-bottom: 1px solid var(--divider-1);
      cursor: pointer;
      transition: background 0.15s;
    }

    .store-card:hover {
      background: rgba(255,255,255,0.02);
    }

    .store-card.selected {
      border-left: 2px solid var(--brand-primary);
      background: rgba(30, 241, 198, 0.05);
    }

    .store-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }

    .store-address {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: var(--space-s);
    }

    .store-distance {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ========== Success Toast ========== */
    .toast-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .toast-overlay.active {
      display: flex;
    }

    .toast-content {
      background: var(--card-bg-1);
      padding: var(--space-3xl);
      text-align: center;
      max-width: 280px;
    }

    .toast-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--space-l);
      color: var(--brand-primary);
    }

    .toast-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: var(--space-s);
    }

    .toast-message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="ios-wrapper">
    <div class="ios-screen">
      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <div class="signal-bars">
            <div class="signal-bar" style="height: 4px;"></div>
            <div class="signal-bar" style="height: 6px;"></div>
            <div class="signal-bar" style="height: 9px;"></div>
            <div class="signal-bar" style="height: 11px;"></div>
          </div>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/>
            <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="square"/>
            <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="square" opacity="0.7"/>
          </svg>
          <div class="battery">
            <div style="width: 85%; height: 100%; background: currentColor; border-radius: 1px;"></div>
            <div class="battery-cap"></div>
          </div>
        </div>
      </div>

      <!-- App Content -->
      <div class="app-content">
        <!-- Hero Section -->
        <div class="hero-section">
          <!-- Logo -->
          <img src="assets/logo-white.png" alt="LYNK&CO" class="hero-logo">

          <!-- Vehicle Image Placeholder -->
          <div class="hero-placeholder">
            <svg class="car-icon" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="10" y="45" width="100" height="40" rx="8" stroke-linejoin="miter"/>
              <path d="M25 45 L35 25 L85 25 L95 45" stroke-linejoin="miter"/>
              <circle cx="35" cy="85" r="12"/>
              <circle cx="85" cy="85" r="12"/>
              <line x1="45" y1="35" x2="55" y2="35"/>
              <line x1="65" y1="35" x2="75" y2="35"/>
            </svg>
            <span class="placeholder-text">车型图片待替换</span>
          </div>

          <!-- Gradient Overlay -->
          <div class="hero-overlay"></div>
        </div>

        <!-- Bottom Sheet -->
        <div class="bottom-sheet">
          <!-- Title -->
          <div class="sheet-title-row">
            <div class="green-indicator"></div>
            <h2 class="sheet-title">预约试驾</h2>
          </div>

          <!-- Form -->
          <div id="testDriveForm">
            <!-- Vehicle Selection -->
            <div class="form-field" id="vehicleField">
              <div class="form-field-label">试驾车型</div>
              <div class="form-field-value">
                <span id="selectedVehicle" class="form-field-placeholder">请选择</span>
                <svg class="arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M7 5l5 5-5 5" stroke-linecap="square" stroke-linejoin="miter"/>
                </svg>
              </div>
            </div>

            <!-- Phone Number -->
            <div class="form-field">
              <div class="form-field-label">手机号码</div>
              <div class="form-field-value">
                <input type="tel" class="input-field" id="phoneInput" placeholder="请输入手机号码" maxlength="11">
              </div>
            </div>

            <!-- Store Selection -->
            <div class="form-field" id="storeField">
              <div class="form-field-label">附近门店</div>
              <div class="form-field-value">
                <span id="selectedStore" class="form-field-placeholder">请选择</span>
                <svg class="arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M7 5l5 5-5 5" stroke-linecap="square" stroke-linejoin="miter"/>
                </svg>
              </div>
            </div>

            <!-- Submit Button -->
            <button class="btn-primary" id="submitBtn" disabled>立即预约</button>

            <!-- Disclaimer -->
            <p class="disclaimer">提交后将有专人联系您确认试驾时间，请保持手机畅通</p>
          </div>
        </div>

        <!-- Vehicle Selection Modal -->
        <div class="modal-overlay" id="vehicleModal">
          <div class="modal-content">
            <div class="modal-header">
              <span class="modal-title">选择车型</span>
              <svg class="modal-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="closeVehicleModal">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="square"/>
              </svg>
            </div>
            <div id="vehicleList"></div>
          </div>
        </div>

        <!-- Store Selection Modal -->
        <div class="modal-overlay" id="storeModal">
          <div class="modal-content">
            <div class="modal-header">
              <span class="modal-title">选择门店</span>
              <svg class="modal-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="closeStoreModal">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="square"/>
              </svg>
            </div>
            <div id="storeList"></div>
          </div>
        </div>

        <!-- Success Toast -->
        <div class="toast-overlay" id="successToast">
          <div class="toast-content">
            <svg class="toast-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="24" cy="24" r="20"/>
              <path d="M16 24l6 6 10-12" stroke-linecap="square" stroke-linejoin="miter"/>
            </svg>
            <div class="toast-title">预约成功</div>
            <div class="toast-message">工作人员将在24小时内联系您确认试驾安排</div>
          </div>
        </div>
      </div>

      <!-- Home Indicator -->
      <div class="home-indicator"></div>
    </div>
  </div>

  <script>
    // ========== Data ==========
    const vehicles = [
      { id: 1, name: '领克 08 EM-P', desc: '超长续航 智能电混 SUV' },
      { id: 2, name: '领克 Z10', desc: '纯电旗舰轿车' },
      { id: 3, name: '领克 07 EM-P', desc: '都市智能电混轿车' },
      { id: 4, name: '领克 09 EM-P', desc: '豪华智能电混 SUV' },
      { id: 5, name: '领克 03+', desc: '性能运动轿车' },
      { id: 6, name: '领克 01 EM-P', desc: '都市智能电混 SUV' },
    ];

    const stores = [
      { id: 1, name: '领克中心 · 西湖店', address: '杭州市西湖区文三路 199 号', distance: '2.3km' },
      { id: 2, name: '领克空间 · 城西银泰店', address: '杭州市拱墅区丰潭路 380 号', distance: '4.1km' },
      { id: 3, name: '领克中心 · 滨江店', address: '杭州市滨江区江南大道 588 号', distance: '6.8km' },
      { id: 4, name: '领克空间 · 万象城店', address: '杭州市上城区富春路 701 号', distance: '8.2km' },
    ];

    // ========== State ==========
    let selectedVehicleId = null;
    let selectedStoreId = null;

    // ========== Elements ==========
    const vehicleField = document.getElementById('vehicleField');
    const storeField = document.getElementById('storeField');
    const vehicleModal = document.getElementById('vehicleModal');
    const storeModal = document.getElementById('storeModal');
    const closeVehicleModal = document.getElementById('closeVehicleModal');
    const closeStoreModal = document.getElementById('closeStoreModal');
    const vehicleList = document.getElementById('vehicleList');
    const storeList = document.getElementById('storeList');
    const selectedVehicleEl = document.getElementById('selectedVehicle');
    const selectedStoreEl = document.getElementById('selectedStore');
    const phoneInput = document.getElementById('phoneInput');
    const submitBtn = document.getElementById('submitBtn');
    const successToast = document.getElementById('successToast');

    // ========== Render Functions ==========
    function renderVehicleList() {
      vehicleList.innerHTML = vehicles.map(v => `
        <div class="vehicle-card ${selectedVehicleId === v.id ? 'selected' : ''}" data-id="${v.id}">
          <div class="vehicle-image">车型图</div>
          <div class="vehicle-info">
            <div class="vehicle-name">${v.name}</div>
            <div class="vehicle-desc">${v.desc}</div>
          </div>
        </div>
      `).join('');

      // Add click handlers
      vehicleList.querySelectorAll('.vehicle-card').forEach(card => {
        card.addEventListener('click', () => {
          selectedVehicleId = parseInt(card.dataset.id);
          const vehicle = vehicles.find(v => v.id === selectedVehicleId);
          selectedVehicleEl.textContent = vehicle.name;
          selectedVehicleEl.classList.remove('form-field-placeholder');
          vehicleModal.classList.remove('active');
          validateForm();
        });
      });
    }

    function renderStoreList() {
      storeList.innerHTML = stores.map(s => `
        <div class="store-card ${selectedStoreId === s.id ? 'selected' : ''}" data-id="${s.id}">
          <div class="store-name">${s.name}</div>
          <div class="store-address">${s.address}</div>
          <div class="store-distance">距您 ${s.distance}</div>
        </div>
      `).join('');

      // Add click handlers
      storeList.querySelectorAll('.store-card').forEach(card => {
        card.addEventListener('click', () => {
          selectedStoreId = parseInt(card.dataset.id);
          const store = stores.find(s => s.id === selectedStoreId);
          selectedStoreEl.textContent = store.name;
          selectedStoreEl.classList.remove('form-field-placeholder');
          storeModal.classList.remove('active');
          validateForm();
        });
      });
    }

    // ========== Form Validation ==========
    function validateForm() {
      const phone = phoneInput.value.trim();
      const isPhoneValid = /^1[3-9]\d{9}$/.test(phone);
      const isVehicleSelected = selectedVehicleId !== null;
      const isStoreSelected = selectedStoreId !== null;

      submitBtn.disabled = !(isPhoneValid && isVehicleSelected && isStoreSelected);
    }

    // ========== Event Listeners ==========
    vehicleField.addEventListener('click', () => {
      renderVehicleList();
      vehicleModal.classList.add('active');
    });

    storeField.addEventListener('click', () => {
      renderStoreList();
      storeModal.classList.add('active');
    });

    closeVehicleModal.addEventListener('click', () => {
      vehicleModal.classList.remove('active');
    });

    closeStoreModal.addEventListener('click', () => {
      storeModal.classList.remove('active');
    });

    vehicleModal.addEventListener('click', (e) => {
      if (e.target === vehicleModal) {
        vehicleModal.classList.remove('active');
      }
    });

    storeModal.addEventListener('click', (e) => {
      if (e.target === storeModal) {
        storeModal.classList.remove('active');
      }
    });

    phoneInput.addEventListener('input', validateForm);

    submitBtn.addEventListener('click', () => {
      if (!submitBtn.disabled) {
        successToast.classList.add('active');

        // Reset after 3 seconds
        setTimeout(() => {
          successToast.classList.remove('active');
          // Reset form
          selectedVehicleId = null;
          selectedStoreId = null;
          phoneInput.value = '';
          selectedVehicleEl.textContent = '请选择';
          selectedVehicleEl.classList.add('form-field-placeholder');
          selectedStoreEl.textContent = '请选择';
          selectedStoreEl.classList.add('form-field-placeholder');
          submitBtn.disabled = true;
        }, 3000);
      }
    });

    // Close toast on click
    successToast.addEventListener('click', () => {
      successToast.classList.remove('active');
    });
  </script>
</body>
</html>
